apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-card-api
  namespace: travelcard
  labels:
    app: travel-card-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-card-api
  template:
    metadata:
      labels:
        app: travel-card-api
    spec:
      containers:
        - name: travel-card-api
          image: aditya-eddy/travel-card-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: travel-card-api-config
            - secretRef:
                name: travel-card-api-secrets
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
