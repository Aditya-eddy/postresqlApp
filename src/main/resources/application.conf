ktor {
    deployment {
        port = 8080
        host = "0.0.0.0"
    }
    application {
        modules = [ com.agoda.travelcard.api.ApplicationKt.module ]
    }
}

service {
    name = "travel-card-api-standalone"
    cluster = "AP"
}

database {
    poolName = "agoda-wallet-postgres\\pgsql"
    jdbcUrl = "jdbc:postgresql://localhost:5432/agoda_wallet"
    jdbcUrl = ${?DATABASE_JDBC_URL}
    username = "agoda_wallet"
    username = ${?DATABASE_USERNAME}
    password = "agoda_wallet"
    password = ${?DATABASE_PASSWORD}
    maximumPoolSize = 10
    connectionTimeoutMs = 5000
}

vault {
    address = "http://localhost:8200"
    address = ${?VAULT_ADDR}
    token = "dev-root-token"
    token = ${?VAULT_TOKEN}
}

proxy {
    host = "sisproxy.hkg.agoda.local"
    port = 3128
    enabled = false
    enabled = ${?PROXY_ENABLED}
}

wise {
    baseUrl = "https://api.wise-sandbox.com"
    baseUrl = ${?WISE_BASE_URL}
    clientId = "agoda-travelcard"
    clientId = ${?WISE_CLIENT_ID}
    clientSecret = "sandbox-secret"
    clientSecret = ${?WISE_CLIENT_SECRET}
    physicalCardProgram = "VISA_DEBIT_CONSUMER_SG_1_PHYSICAL_CARDS_API"
    virtualCardProgram = "VISA_DEBIT_CONSUMER_SG_1_CARDS_API"
    subsidy {
        clientId = "agoda-travelcard-subsidy"
        clientId = ${?WISE_SUBSIDY_CLIENT_ID}
        clientSecret = "sandbox-secret-subsidy"
        clientSecret = ${?WISE_SUBSIDY_CLIENT_SECRET}
    }
}

observability {
    otlpEndpoint = "http://localhost:4317"
    otlpEndpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    serviceName = "travel-card-api-standalone"
}
